service: task-processing-service

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'ap-south-1'}
  memorySize: 128
  timeout: 10
  environment:
    TODOS_TABLE: todos-${self:provider.stage}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:UpdateItem
            - dynamodb:GetItem
          Resource: !Sub "arn:aws:dynamodb:${self:provider.region}:${AWS::AccountId}:table/todos-${self:provider.stage}"

plugins:
  - serverless-esbuild

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node18
    platform: node

functions:
  processTask:
    handler: src/handlers/processTask.handler
    events:
      - sqs:
          arn: ${cf:todo-service-${self:provider.stage}.TodoTaskQueueArn}
          batchSize: 1
