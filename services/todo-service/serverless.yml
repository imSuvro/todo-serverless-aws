service: todo-service

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, env:AWS_REGION, 'ap-south-1'}
  memorySize: 128
  timeout: 10
  environment:
    AWS_REGION: ${self:provider.region}
    TODOS_TABLE: todos-${self:provider.stage}
    TODO_TASK_QUEUE_URL: !Ref TodoTaskQueue
    TODO_EVENTS_TOPIC_ARN: !Ref TodoEventsTopic
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Scan
            - dynamodb:Query
          Resource:
            - !GetAtt TodosTable.Arn
            - !Sub "${TodosTable.Arn}/index/*"
        - Effect: Allow
          Action:
            - sqs:SendMessage
          Resource: !GetAtt TodoTaskQueue.Arn
        - Effect: Allow
          Action:
            - sns:Publish
          Resource: !Ref TodoEventsTopic

plugins:
  - serverless-esbuild

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node18
    platform: node
    concurrency: 10

functions:
  createTodo:
    handler: src/handlers/createTodo.handler
    events:
      - http:
          path: todos
          method: post
          cors: true

  listTodos:
    handler: src/handlers/listTodos.handler
    events:
      - http:
          path: todos
          method: get
          cors: true

  getTodo:
    handler: src/handlers/getTodo.handler
    events:
      - http:
          path: todos/{id}
          method: get
          cors: true

  updateTodo:
    handler: src/handlers/updateTodo.handler
    events:
      - http:
          path: todos/{id}
          method: put
          cors: true

  deleteTodo:
    handler: src/handlers/deleteTodo.handler
    events:
      - http:
          path: todos/{id}
          method: delete
          cors: true

resources:
  Resources:
    TodosTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: todos-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: todoId
            AttributeType: S
          - AttributeName: status
            AttributeType: S
          - AttributeName: createdAt
            AttributeType: S
        KeySchema:
          - AttributeName: todoId
            KeyType: HASH
        GlobalSecondaryIndexes:
          - IndexName: StatusIndex
            KeySchema:
              - AttributeName: status
                KeyType: HASH
              - AttributeName: createdAt
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    TodoTaskQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: todo-task-queue-${self:provider.stage}
        VisibilityTimeout: 60
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt TodoTaskDLQ.Arn
          maxReceiveCount: 3

    TodoTaskDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: todo-task-dlq-${self:provider.stage}
        MessageRetentionPeriod: 1209600

    TodoEventsTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: todo-events-${self:provider.stage}

  Outputs:
    TodosTableArn:
      Value: !GetAtt TodosTable.Arn
      Export:
        Name: TodosTableArn-${self:provider.stage}

    TodoTaskQueueArn:
      Value: !GetAtt TodoTaskQueue.Arn
      Export:
        Name: TodoTaskQueueArn-${self:provider.stage}

    TodoTaskQueueUrl:
      Value: !Ref TodoTaskQueue
      Export:
        Name: TodoTaskQueueUrl-${self:provider.stage}

    TodoEventsTopicArn:
      Value: !Ref TodoEventsTopic
      Export:
        Name: TodoEventsTopicArn-${self:provider.stage}
