service: notification-service

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'ap-south-1'}
  memorySize: 128
  timeout: 10

plugins:
  - serverless-esbuild

custom:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node18
    platform: node

functions:
  handleNotification:
    handler: src/handlers/handleNotification.handler
    events:
      - sns: ${cf:todo-service-${self:provider.stage}.TodoEventsTopicArn}
